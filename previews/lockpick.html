<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Noventis - Lockpick</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      html, body {
        height: 100%;
        background: #0a0a0d;
        color: #f1ece3;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }

      .stage {
        position: relative;
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0d;
      }

      canvas { display: block; }

      .hud {
        position: absolute;
        top: 1.4rem;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 2.4rem;
        font-size: 0.72rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(172, 163, 147, 0.8);
        pointer-events: none;
      }
      .hud strong {
        color: #c4884d;
        font-weight: 500;
      }

      .hint {
        position: absolute;
        bottom: 1.4rem;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 0.66rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(172, 163, 147, 0.45);
        pointer-events: none;
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 5;
        background: rgba(10, 10, 13, 0.88);
        opacity: 0;
        pointer-events: none;
        transition: opacity 400ms ease;
      }
      .overlay.is-visible {
        opacity: 1;
        pointer-events: auto;
      }
      .overlay-box {
        text-align: center;
        padding: 2rem;
      }
      .overlay-box h1 {
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 400;
        font-size: 1.8rem;
        margin-bottom: 0.6rem;
        color: #c4884d;
      }
      .overlay-box p {
        color: rgba(172, 163, 147, 0.8);
        margin-bottom: 1.2rem;
        font-size: 0.88rem;
      }
      .overlay-box button {
        appearance: none;
        background: #c4884d;
        color: #0a0a0d;
        border: 0;
        padding: 0.55rem 1.2rem;
        border-radius: 999px;
        font-family: inherit;
        font-size: 0.76rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
      }
      .overlay-box button:hover {
        box-shadow: 0 8px 24px rgba(196, 136, 77, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <canvas id="lock"></canvas>
      <div class="hud">
        <span>Bobby pins <strong id="pins">5</strong></span>
        <span>Difficulty <strong id="diff">Average</strong></span>
        <span>Locks picked <strong id="score">0</strong></span>
      </div>
      <div class="hint">Move mouse to position the pin. Click and hold to turn the lock.</div>
    </div>

    <div class="overlay" id="overlay">
      <div class="overlay-box">
        <h1 id="overlay-title"></h1>
        <p id="overlay-text"></p>
        <button type="button" id="overlay-btn">Try again</button>
      </div>
    </div>

    <script>
      (() => {
        const canvas = document.getElementById('lock')
        const ctx = canvas.getContext('2d')
        const pinsEl = document.getElementById('pins')
        const diffEl = document.getElementById('diff')
        const scoreEl = document.getElementById('score')
        const overlay = document.getElementById('overlay')
        const dpr = Math.min(window.devicePixelRatio || 1, 2)

        let W = 0, H = 0
        function resize() {
          W = Math.min(window.innerWidth, 800)
          H = Math.min(window.innerHeight, 800)
          canvas.width = W * dpr
          canvas.height = H * dpr
          canvas.style.width = W + 'px'
          canvas.style.height = H + 'px'
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
        }
        window.addEventListener('resize', resize)
        resize()

        const cx = () => W / 2
        const cy = () => H / 2
        const rOuter = () => Math.min(W, H) * 0.36
        const rInner = () => rOuter() * 0.44

        const DIFFICULTIES = [
          { name: 'Very Easy', tolerance: 20 },
          { name: 'Easy', tolerance: 15 },
          { name: 'Average', tolerance: 10 },
          { name: 'Hard', tolerance: 6 },
          { name: 'Very Hard', tolerance: 3.5 },
        ]

        let diffIdx = 2
        let sweetSpot = 0, tolerance = 10
        let pinAngle = 0, turnAngle = 0
        let turning = false
        let pinHealth = 1
        let shakeAmt = 0
        let pins = 5, score = 0
        let locked = false, won = false
        let mouseInCanvas = false
        let mouseX = 0, mouseY = 0

        // Decorative: scratches on the lock face (generated once per lock)
        let scratches = []
        function genScratches() {
          scratches = []
          const r = rOuter()
          for (let i = 0; i < 24; i++) {
            const a = Math.random() * Math.PI * 2
            const d = 0.25 + Math.random() * 0.7
            const len = 8 + Math.random() * 30
            const da = (Math.random() - 0.5) * 0.4
            scratches.push({ a, d, len, da })
          }
        }

        // Dust motes floating in front of the lock
        const DUST_COUNT = 18
        const dust = []
        for (let i = 0; i < DUST_COUNT; i++) {
          dust.push({
            x: Math.random(),
            y: Math.random(),
            r: 0.5 + Math.random() * 1.2,
            speed: 0.0001 + Math.random() * 0.0003,
            drift: Math.random() * Math.PI * 2,
            alpha: 0.08 + Math.random() * 0.12,
          })
        }

        function newLock() {
          sweetSpot = -80 + Math.random() * 160
          tolerance = DIFFICULTIES[diffIdx].tolerance
          pinAngle = 0
          turnAngle = 0
          turning = false
          pinHealth = 1
          shakeAmt = 0
          locked = false
          won = false
          genScratches()
          diffEl.textContent = DIFFICULTIES[diffIdx].name
          pinsEl.textContent = pins
          scoreEl.textContent = score
          overlay.classList.remove('is-visible')
        }

        // Mouse: only update pinAngle when inside canvas and not turning.
        // Pin angle PERSISTS when mouse leaves. No jump.
        window.addEventListener('mousemove', (e) => {
          const rect = canvas.getBoundingClientRect()
          mouseX = e.clientX - rect.left
          mouseY = e.clientY - rect.top
          mouseInCanvas = mouseX >= 0 && mouseY >= 0 && mouseX <= W && mouseY <= H
        })
        window.addEventListener('mousedown', () => { if (!locked && !won) turning = true })
        window.addEventListener('mouseup', () => { turning = false })

        canvas.addEventListener('touchstart', (e) => {
          e.preventDefault()
          if (!locked && !won) turning = true
          const t = e.touches[0]
          const rect = canvas.getBoundingClientRect()
          mouseX = t.clientX - rect.left
          mouseY = t.clientY - rect.top
          mouseInCanvas = true
        })
        canvas.addEventListener('touchmove', (e) => {
          e.preventDefault()
          const t = e.touches[0]
          const rect = canvas.getBoundingClientRect()
          mouseX = t.clientX - rect.left
          mouseY = t.clientY - rect.top
        })
        canvas.addEventListener('touchend', () => { turning = false })

        function maxTurnForPin() {
          let dist = Math.abs(pinAngle - sweetSpot)
          if (dist > 180) dist = 360 - dist
          if (dist <= tolerance) return 90
          const ratio = Math.max(0, 1 - (dist - tolerance) / (90 - tolerance))
          return ratio * 90
        }

        function showOverlay(title, text) {
          document.getElementById('overlay-title').textContent = title
          document.getElementById('overlay-text').textContent = text
          overlay.classList.add('is-visible')
        }

        function tick(now) {
          // Update pin angle from mouse (only when not turning AND mouse is on canvas)
          if (!turning && !locked && !won && mouseInCanvas) {
            const dx = mouseX - cx()
            const dy = mouseY - cy()
            let target = Math.atan2(dy, dx) * (180 / Math.PI)
            target = Math.max(-90, Math.min(90, target))
            pinAngle += (target - pinAngle) * 0.18
          }

          if (turning && !locked && !won) {
            const maxT = maxTurnForPin()
            turnAngle += (maxT - turnAngle) * 0.07

            if (turnAngle >= 88.5) {
              won = true
              score++
              scoreEl.textContent = score
              setTimeout(() => {
                diffIdx = Math.min(DIFFICULTIES.length - 1, diffIdx + 1)
                pins = Math.min(pins + 1, 10)
                newLock()
              }, 1400)
            }

            if (maxT < 90 && turnAngle > maxT * 0.82) {
              const overshoot = turnAngle - maxT * 0.82
              shakeAmt = Math.min(7, overshoot * 0.18)
              pinHealth -= 0.00525 * (1 + overshoot * 0.0375)
              if (pinHealth <= 0) {
                pinHealth = 0
                pins--
                pinsEl.textContent = pins
                if (pins <= 0) {
                  locked = true
                  setTimeout(() => showOverlay('Lock jammed', `Ran out of bobby pins. Locks picked: ${score}`), 500)
                } else {
                  pinHealth = 1
                  pinAngle = 0
                  turnAngle = 0
                  shakeAmt = 10
                }
              }
            }
          } else {
            turnAngle += (0 - turnAngle) * 0.08
          }

          shakeAmt *= 0.91
          if (shakeAmt < 0.08) shakeAmt = 0

          draw(now)
          requestAnimationFrame(tick)
        }

        function draw(now) {
          ctx.clearRect(0, 0, W, H)
          const x = cx(), y = cy()
          const rO = rOuter(), rI = rInner()

          // Ambient vignette
          const vig = ctx.createRadialGradient(x, y, rO * 0.3, x, y, Math.max(W, H) * 0.8)
          vig.addColorStop(0, 'rgba(20, 18, 16, 0)')
          vig.addColorStop(1, 'rgba(0, 0, 0, 0.7)')
          ctx.fillStyle = vig
          ctx.fillRect(0, 0, W, H)

          const sx = shakeAmt * (Math.random() - 0.5) * 2
          const sy = shakeAmt * (Math.random() - 0.5) * 2
          ctx.save()
          ctx.translate(sx, sy)

          // Lock housing (rounded rectangle behind the circle)
          const hPad = rO * 0.28
          const hW = rO * 2 + hPad * 2
          const hH = rO * 2.3 + hPad
          const hX = x - hW / 2
          const hY = y - rO - hPad * 0.6
          const hR = 12
          ctx.beginPath()
          ctx.moveTo(hX + hR, hY)
          ctx.arcTo(hX + hW, hY, hX + hW, hY + hH, hR)
          ctx.arcTo(hX + hW, hY + hH, hX, hY + hH, hR)
          ctx.arcTo(hX, hY + hH, hX, hY, hR)
          ctx.arcTo(hX, hY, hX + hW, hY, hR)
          ctx.closePath()
          ctx.fillStyle = '#141418'
          ctx.fill()
          ctx.lineWidth = 1
          ctx.strokeStyle = 'rgba(236, 225, 210, 0.08)'
          ctx.stroke()

          // Bolts on housing corners
          const boltPositions = [
            [hX + 16, hY + 16], [hX + hW - 16, hY + 16],
            [hX + 16, hY + hH - 16], [hX + hW - 16, hY + hH - 16],
          ]
          for (const [bx, by] of boltPositions) {
            ctx.beginPath()
            ctx.arc(bx, by, 5, 0, Math.PI * 2)
            ctx.fillStyle = '#1c1c22'
            ctx.fill()
            ctx.lineWidth = 0.8
            ctx.strokeStyle = 'rgba(236, 225, 210, 0.1)'
            ctx.stroke()
            ctx.beginPath()
            ctx.moveTo(bx - 3, by)
            ctx.lineTo(bx + 3, by)
            ctx.lineWidth = 1
            ctx.strokeStyle = 'rgba(236, 225, 210, 0.07)'
            ctx.stroke()
          }

          // Lock face (outer ring) with metallic gradient
          const lockGrad = ctx.createRadialGradient(x - rO * 0.3, y - rO * 0.3, 0, x, y, rO)
          lockGrad.addColorStop(0, '#2a2a30')
          lockGrad.addColorStop(0.5, '#1e1e24')
          lockGrad.addColorStop(1, '#151518')
          ctx.beginPath()
          ctx.arc(x, y, rO, 0, Math.PI * 2)
          ctx.fillStyle = lockGrad
          ctx.fill()
          ctx.lineWidth = 2
          ctx.strokeStyle = 'rgba(236, 225, 210, 0.12)'
          ctx.stroke()

          // Concentric machining rings on the lock face
          for (let i = 1; i <= 5; i++) {
            ctx.beginPath()
            ctx.arc(x, y, rI + (rO - rI) * (i / 6), 0, Math.PI * 2)
            ctx.lineWidth = 0.4
            ctx.strokeStyle = `rgba(236, 225, 210, ${0.03 + i * 0.005})`
            ctx.stroke()
          }

          // Scratches
          for (const s of scratches) {
            const sr = rI + (rO - rI) * s.d
            const sx2 = x + Math.cos(s.a) * sr
            const sy2 = y + Math.sin(s.a) * sr
            const ex = sx2 + Math.cos(s.a + s.da) * s.len
            const ey = sy2 + Math.sin(s.a + s.da) * s.len
            ctx.beginPath()
            ctx.moveTo(sx2, sy2)
            ctx.lineTo(ex, ey)
            ctx.lineWidth = 0.3
            ctx.strokeStyle = 'rgba(236, 225, 210, 0.04)'
            ctx.stroke()
          }

          // Inner cylinder (rotates with lock turn)
          ctx.save()
          ctx.translate(x, y)
          ctx.rotate(turnAngle * Math.PI / 180)

          const cylGrad = ctx.createRadialGradient(-rI * 0.2, -rI * 0.2, 0, 0, 0, rI)
          cylGrad.addColorStop(0, '#181820')
          cylGrad.addColorStop(1, '#0e0e14')
          ctx.beginPath()
          ctx.arc(0, 0, rI, 0, Math.PI * 2)
          ctx.fillStyle = cylGrad
          ctx.fill()
          ctx.lineWidth = 1.5
          ctx.strokeStyle = 'rgba(236, 225, 210, 0.08)'
          ctx.stroke()

          // Keyhole shape (rounded rectangle, wider at top)
          const khW = 6, khH = rI * 0.55
          ctx.beginPath()
          ctx.moveTo(-khW, -khH * 0.15)
          ctx.quadraticCurveTo(-khW - 2, -khH * 0.4, -khW + 1, -khH * 0.45)
          ctx.lineTo(khW - 1, -khH * 0.45)
          ctx.quadraticCurveTo(khW + 2, -khH * 0.4, khW, -khH * 0.15)
          ctx.lineTo(khW * 0.35, -khH * 0.15)
          ctx.lineTo(khW * 0.35, khH)
          ctx.lineTo(-khW * 0.35, khH)
          ctx.lineTo(-khW * 0.35, -khH * 0.15)
          ctx.closePath()
          ctx.fillStyle = 'rgba(5, 5, 8, 0.85)'
          ctx.fill()
          ctx.lineWidth = 0.5
          ctx.strokeStyle = 'rgba(236, 225, 210, 0.06)'
          ctx.stroke()

          // Screwdriver (extends from keyhole down)
          const sdY = khH * 0.6
          const sdLen = rO * 0.95

          // Shaft
          ctx.beginPath()
          ctx.moveTo(-1.8, sdY)
          ctx.lineTo(-1.8, sdLen)
          ctx.lineTo(1.8, sdLen)
          ctx.lineTo(1.8, sdY)
          ctx.closePath()
          const sdGrad = ctx.createLinearGradient(-2, 0, 2, 0)
          sdGrad.addColorStop(0, 'rgba(160, 110, 60, 0.6)')
          sdGrad.addColorStop(0.5, 'rgba(196, 136, 77, 0.75)')
          sdGrad.addColorStop(1, 'rgba(140, 95, 50, 0.55)')
          ctx.fillStyle = sdGrad
          ctx.fill()

          // Handle grip
          const handleTop = sdLen
          const handleBot = sdLen + 40
          const handleW = 7
          ctx.beginPath()
          ctx.moveTo(-handleW, handleTop)
          ctx.quadraticCurveTo(-handleW - 2, (handleTop + handleBot) / 2, -handleW, handleBot)
          ctx.lineTo(handleW, handleBot)
          ctx.quadraticCurveTo(handleW + 2, (handleTop + handleBot) / 2, handleW, handleTop)
          ctx.closePath()
          const hGrad = ctx.createLinearGradient(-handleW, 0, handleW, 0)
          hGrad.addColorStop(0, 'rgba(120, 75, 35, 0.65)')
          hGrad.addColorStop(0.3, 'rgba(160, 110, 55, 0.7)')
          hGrad.addColorStop(0.7, 'rgba(155, 105, 50, 0.65)')
          hGrad.addColorStop(1, 'rgba(100, 65, 30, 0.55)')
          ctx.fillStyle = hGrad
          ctx.fill()

          // Grip ridges
          for (let i = 0; i < 5; i++) {
            const ry = handleTop + 6 + i * 6
            ctx.beginPath()
            ctx.moveTo(-handleW + 1, ry)
            ctx.lineTo(handleW - 1, ry)
            ctx.lineWidth = 0.6
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.25)'
            ctx.stroke()
          }

          // Flat tip (the bit that goes in the lock)
          ctx.beginPath()
          ctx.moveTo(-3, sdY - 2)
          ctx.lineTo(-1.8, sdY)
          ctx.lineTo(1.8, sdY)
          ctx.lineTo(3, sdY - 2)
          ctx.closePath()
          ctx.fillStyle = 'rgba(180, 125, 70, 0.7)'
          ctx.fill()

          ctx.restore()

          // Bobby pin
          ctx.save()
          ctx.translate(x, y)
          const pinRad = pinAngle * Math.PI / 180
          const pinLen = rO * 0.88

          // Health-based colour
          const hr = Math.round(220 + 35 * (1 - pinHealth))
          const hg = Math.round(200 * pinHealth + 60 * (1 - pinHealth))
          const hb = Math.round(180 * pinHealth + 50 * (1 - pinHealth))
          const pinCol = `rgba(${hr}, ${hg}, ${hb}, 0.9)`
          const pinColFaint = `rgba(${hr}, ${hg}, ${hb}, 0.45)`

          // Pin shaft (slightly thicker, with highlight)
          const px = Math.cos(pinRad) * pinLen
          const py = Math.sin(pinRad) * pinLen
          ctx.beginPath()
          ctx.moveTo(0, 0)
          ctx.lineTo(px, py)
          ctx.lineWidth = 2.5
          ctx.strokeStyle = pinCol
          ctx.lineCap = 'round'
          ctx.stroke()

          // Highlight edge on the pin
          ctx.beginPath()
          const offX = Math.sin(pinRad) * 0.8
          const offY = -Math.cos(pinRad) * 0.8
          ctx.moveTo(offX, offY)
          ctx.lineTo(px + offX, py + offY)
          ctx.lineWidth = 0.6
          ctx.strokeStyle = `rgba(255, 255, 255, ${0.08 * pinHealth})`
          ctx.stroke()

          // Bent tip
          const tipLen = 16
          const tipAngle = pinRad - Math.PI * 0.35
          const tx = px + Math.cos(tipAngle) * tipLen
          const ty = py + Math.sin(tipAngle) * tipLen
          ctx.beginPath()
          ctx.moveTo(px, py)
          ctx.lineTo(tx, ty)
          ctx.lineWidth = 2
          ctx.strokeStyle = pinCol
          ctx.stroke()

          // Second bend at the very tip
          const tip2Angle = tipAngle + Math.PI * 0.15
          const tip2Len = 6
          ctx.beginPath()
          ctx.moveTo(tx, ty)
          ctx.lineTo(tx + Math.cos(tip2Angle) * tip2Len, ty + Math.sin(tip2Angle) * tip2Len)
          ctx.lineWidth = 1.5
          ctx.stroke()

          // Handle extending out the back
          const hx1 = Math.cos(pinRad + Math.PI) * (rO + 20)
          const hy1 = Math.sin(pinRad + Math.PI) * (rO + 20)
          ctx.beginPath()
          ctx.moveTo(0, 0)
          ctx.lineTo(hx1, hy1)
          ctx.lineWidth = 2.5
          ctx.strokeStyle = pinColFaint
          ctx.stroke()

          // Loop at handle end
          const loopR = 7
          ctx.beginPath()
          ctx.arc(hx1, hy1, loopR, 0, Math.PI * 2)
          ctx.lineWidth = 2
          ctx.strokeStyle = pinColFaint
          ctx.stroke()

          // Second pin arm (the parallel one in a real bobby pin)
          const arm2Offset = 3
          const a2ox = Math.sin(pinRad) * arm2Offset
          const a2oy = -Math.cos(pinRad) * arm2Offset
          ctx.beginPath()
          ctx.moveTo(a2ox, a2oy)
          ctx.lineTo(hx1 + a2ox, hy1 + a2oy)
          ctx.lineWidth = 1.5
          ctx.strokeStyle = `rgba(${hr}, ${hg}, ${hb}, 0.3)`
          ctx.stroke()

          ctx.restore()

          // Pin health bar
          if (!won) {
            const barW = 70
            const barH = 3
            const barX = x - barW / 2
            const barY = y + rO + hPad * 0.6 + 14
            ctx.fillStyle = 'rgba(255, 255, 255, 0.04)'
            ctx.fillRect(barX, barY, barW, barH)
            ctx.fillStyle = pinHealth > 0.3
              ? 'rgba(196, 136, 77, 0.65)'
              : 'rgba(220, 60, 40, 0.8)'
            ctx.fillRect(barX, barY, pinHealth * barW, barH)
          }

          // Lock housing reference for health bar placement
          const hPad2 = rO * 0.28

          // Floating dust
          for (const d of dust) {
            d.y -= d.speed
            d.x += Math.sin(now * 0.001 + d.drift) * 0.00008
            if (d.y < -0.05) { d.y = 1.05; d.x = Math.random() }
            ctx.beginPath()
            ctx.arc(d.x * W, d.y * H, d.r, 0, Math.PI * 2)
            ctx.fillStyle = `rgba(236, 225, 210, ${d.alpha})`
            ctx.fill()
          }

          // Won glow
          if (won) {
            const glow = ctx.createRadialGradient(x, y, 0, x, y, rO * 1.3)
            glow.addColorStop(0, 'rgba(196, 136, 77, 0.12)')
            glow.addColorStop(1, 'rgba(196, 136, 77, 0)')
            ctx.fillStyle = glow
            ctx.beginPath()
            ctx.arc(x, y, rO * 1.3, 0, Math.PI * 2)
            ctx.fill()

            ctx.font = '600 13px ui-monospace, monospace'
            ctx.textAlign = 'center'
            ctx.fillStyle = 'rgba(196, 136, 77, 0.9)'
            ctx.fillText('UNLOCKED', x, y + rO + hPad2 + 34)
          }

          ctx.restore() // shake
        }

        const hPad = rOuter() * 0.28 // for health bar in draw

        document.getElementById('overlay-btn').addEventListener('click', () => {
          pins = 5; score = 0; diffIdx = 2; newLock()
        })
        window.addEventListener('keydown', (e) => {
          if (e.key === 'r' || e.key === 'R') { pins = 5; score = 0; diffIdx = 2; newLock() }
        })

        newLock()
        requestAnimationFrame(tick)
      })()
    </script>
  </body>
</html>
