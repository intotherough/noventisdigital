    <linearGradient id="layer2" x1="460" y1="360" x2="740" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8DDCE" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#6C80B0" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="layer3" x1="500" y1="390" x2="700" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F1E7D8" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#967B5E" stop-opacity="0.4"/>
