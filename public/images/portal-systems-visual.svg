<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="900" rx="48" fill="#0A0A0D"/>
  <rect x="24" y="24" width="1152" height="852" rx="36" fill="url(#bg)"/>

  <circle cx="620" cy="430" r="240" fill="url(#glow)" opacity="0.14"/>

  <g transform="translate(600 450)">
    <rect x="-180" y="-120" width="360" height="240" rx="20" fill="none" stroke="url(#layer1)" stroke-width="1.5" transform="rotate(-4)"/>
    <rect x="-140" y="-90" width="280" height="180" rx="16" fill="none" stroke="url(#layer2)" stroke-width="1.3" transform="rotate(2) translate(20 -16)"/>
    <rect x="-100" y="-60" width="200" height="120" rx="12" fill="none" stroke="url(#layer3)" stroke-width="1.1" transform="rotate(-1) translate(40 -30)"/>
  </g>

  <circle cx="504" cy="396" r="3.5" fill="#F1E7D8" opacity="0.7"/>
  <circle cx="696" cy="504" r="3.5" fill="#E8DDCE" opacity="0.6"/>
  <circle cx="660" cy="368" r="4" fill="#F1E7D8" opacity="0.5"/>

  <defs>
    <linearGradient id="bg" x1="600" y1="24" x2="600" y2="876" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111117"/>
      <stop offset="1" stop-color="#0D0D11"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(620 430) scale(240)">
      <stop stop-color="#6C80B0" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#6C80B0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="layer1" x1="420" y1="330" x2="780" y2="570" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F1E7D8" stop-opacity="0.6"/>
